name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Minimum access; no PR comments needed for secret scan
permissions:
  contents: read

jobs:
  secret-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks CLI
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -e
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tgz
          tar -xzf gitleaks.tgz gitleaks
          sudo install gitleaks /usr/local/bin/
          gitleaks version
      - name: Secret scan
        run: gitleaks detect --source . --config .gitleaks.toml --verbose --redact

  build:
    name: Build and lint
    runs-on: ubuntu-latest
    env:
      CI: true
      HUSKY: "0"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=@lenus/shared
      - run: npm run build --workspace=api
      - run: npm run build --workspace=web
      - run: npm run lint --workspace=api
      - run: npm run lint --workspace=web
